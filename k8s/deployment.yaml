apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmt-api
  namespace: bmt-prod
  labels:
    app: bmt-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bmt-api
  template:
    metadata:
      labels:
        app: bmt-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/observability/metrics"
    spec:
      serviceAccountName: bmt-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bmt-api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: bmt-api
      containers:
      - name: api
        image: bmt-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /api/observability/live
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/observability/live
            port: 3000
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/observability/ready
            port: 3000
          periodSeconds: 10
          timeoutSeconds: 5
        envFrom:
        - configMapRef:
            name: bmt-config
